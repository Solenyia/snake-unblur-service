<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Image Unblur</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        body { 
            background: #1a1a1a; 
            color: white; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Povinné tlačidlo podľa zadania */
        .back-btn { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            color: #00ffff; 
            text-decoration: none; 
            border: 1px solid #00ffff; 
            padding: 8px 15px; 
            border-radius: 5px;
            font-weight: bold;
        }
        .back-btn:hover { background: rgba(0, 255, 255, 0.1); }

        h1 { margin-bottom: 10px; }

        /* Kontajner, kde je obrázok a hra na sebe */
        #game-container { 
            position: relative; 
            width: 400px; 
            height: 400px; 
            border: 5px solid #333;
            background: #000;
            overflow: hidden;
        }

        /* Obrázok na pozadí (Layer 1) */
        #image-overlay { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 1; 
        }

        /* Canvas pre hadíka (Layer 2 - priehľadný) */
        #snakeCanvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 2; 
            background: transparent; 
        }

        #status { margin-top: 15px; font-size: 1.1em; color: #ccc; }
        input[type="file"] { margin: 20px 0; }
    </style>
</head>
<body>

    <a href="/" class="back-btn">← Späť na portál</a>

    <h1>Snake Image Unblur</h1>
    
    <input type="file" id="upload" accept="image/*">
    
    <div id="game-container">
        <img id="image-overlay" src="" alt="">
        <canvas id="snakeCanvas" width="400" height="400"></canvas>
    </div>

    <div id="status">Nahraj obrázok, klikni na plochu a šípkami začni hrať!</div>

    <script type="py" src="./main.py" config='{"packages": ["Pillow"]}'></script>

</body>
</html>
